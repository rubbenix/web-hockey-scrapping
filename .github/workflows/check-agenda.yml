name: Check Agenda

on:
  schedule:
    - cron: "0 */3 * * *"
  workflow_dispatch:

permissions:
  contents: write
  
jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2️⃣ Setup Node (sin cache aún)
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # 3️⃣ Instalar PNPM
      - name: Setup PNPM
        uses: pnpm/action-setup@v4
        with:
          version: 10

      # 3.1️⃣ Cache pnpm store to speed subsequent runs
      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: pnpm-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-${{ runner.os }}-

      # 4️⃣ Instalar dependencias
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # 5️⃣ Ejecutar script
      - name: Run agenda check
        run: node checkAgenda.js
        env:
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
          GS_CLIENT_EMAIL: ${{ secrets.GS_CLIENT_EMAIL }}
          GS_PRIVATE_KEY: ${{ secrets.GS_PRIVATE_KEY }}
          GS_SPREADSHEET_ID: ${{ secrets.GS_SPREADSHEET_ID }}